<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 860">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#444441" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="220" y="20" width="240" height="44" rx="8" fill="#2C2C2A" stroke="#2C2C2A" stroke-width="1"/>
  <text x="340" y="42" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#F1EFE8">Submit</text>

  <line x1="340" y1="64" x2="340" y2="94" stroke="#444441" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="220" y="94" width="240" height="44" rx="8" fill="#2C2C2A" stroke="#2C2C2A" stroke-width="1"/>
  <text x="340" y="116" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#F1EFE8">Reviews arrive</text>

  <line x1="340" y1="138" x2="340" y2="168" stroke="#444441" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="240" y="168" width="200" height="44" rx="8" fill="#5F5E5A" stroke="#5F5E5A" stroke-width="1"/>
  <text x="340" y="190" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#F1EFE8">Wait 24 hours</text>

  <line x1="340" y1="212" x2="340" y2="242" stroke="#444441" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="180" y="242" width="320" height="44" rx="8" fill="#2C2C2A" stroke="#2C2C2A" stroke-width="1"/>
  <text x="340" y="264" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#F1EFE8">Sort every comment</text>

  <line x1="340" y1="286" x2="340" y2="306" stroke="#444441" stroke-width="1.5"/>
  <line x1="130" y1="306" x2="560" y2="306" stroke="#444441" stroke-width="1.5"/>
  <line x1="130" y1="306" x2="130" y2="326" stroke="#444441" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="340" y1="306" x2="340" y2="326" stroke="#444441" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="560" y1="306" x2="560" y2="326" stroke="#444441" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="50" y="326" width="160" height="56" rx="4" fill="white" stroke="#444441" stroke-width="1"/>
  <text x="130" y="347" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" font-weight="500" fill="#2C2C2A">Must do</text>
  <text x="130" y="365" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#5F5E5A">Do without argument</text>

  <rect x="260" y="326" width="160" height="56" rx="4" fill="white" stroke="#444441" stroke-width="2.5"/>
  <text x="340" y="347" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" font-weight="500" fill="#2C2C2A">Negotiate</text>
  <text x="340" y="365" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#5F5E5A">Engage, then explain</text>

  <rect x="470" y="326" width="160" height="56" rx="4" fill="white" stroke="#444441" stroke-width="2.5" stroke-dasharray="6,3"/>
  <text x="550" y="347" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" font-weight="500" fill="#2C2C2A">Resist</text>
  <text x="550" y="365" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#5F5E5A">Principled refusal</text>

  <line x1="130" y1="382" x2="130" y2="402" stroke="#444441" stroke-width="1.5"/>
  <line x1="340" y1="382" x2="340" y2="402" stroke="#444441" stroke-width="1.5"/>
  <line x1="550" y1="382" x2="550" y2="402" stroke="#444441" stroke-width="1.5"/>
  <line x1="130" y1="402" x2="550" y2="402" stroke="#444441" stroke-width="1.5"/>
  <line x1="340" y1="402" x2="340" y2="422" stroke="#444441" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="190" y="422" width="300" height="44" rx="8" fill="#2C2C2A" stroke="#2C2C2A" stroke-width="1"/>
  <text x="340" y="444" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#F1EFE8">Write response document</text>

  <line x1="340" y1="466" x2="340" y2="496" stroke="#444441" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="190" y="496" width="300" height="44" rx="8" fill="#2C2C2A" stroke="#2C2C2A" stroke-width="1"/>
  <text x="340" y="518" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#F1EFE8">Revise manuscript</text>

  <line x1="340" y1="540" x2="340" y2="570" stroke="#444441" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="190" y="570" width="300" height="44" rx="8" fill="#2C2C2A" stroke="#2C2C2A" stroke-width="1"/>
  <text x="340" y="592" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#F1EFE8">Write cover letter</text>

  <line x1="340" y1="614" x2="340" y2="648" stroke="#444441" stroke-width="1.5" marker-end="url(#arr)"/>

  <polygon points="340,648 490,696 340,744 190,696" fill="white" stroke="#444441" stroke-width="1"/>
  <text x="340" y="689" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" font-weight="500" fill="#2C2C2A">Editor</text>
  <text x="340" y="707" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" font-weight="500" fill="#2C2C2A">decision?</text>

  <line x1="340" y1="744" x2="340" y2="776" stroke="#444441" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="352" y="764" font-family="sans-serif" font-size="12" fill="#444441">Accept</text>
  <rect x="220" y="776" width="240" height="44" rx="8" fill="white" stroke="#444441" stroke-width="3"/>
  <text x="340" y="798" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">Published</text>

  <path d="M490 696 L650 696 L650 42 L462 42" fill="none" stroke="#444441" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="658" y="430" font-family="sans-serif" font-size="11" fill="#444441" transform="rotate(90 658 430)">Revise and resubmit</text>
  <text x="498" y="688" font-family="sans-serif" font-size="12" fill="#444441">R&amp;R</text>

  <path d="M190 696 L30 696 L30 42 L218 42" fill="none" stroke="#444441" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="22" y="430" font-family="sans-serif" font-size="11" fill="#444441" transform="rotate(-90 22 430)">Reject — fix and resubmit</text>
  <text x="130" y="688" font-family="sans-serif" font-size="12" fill="#444441">Reject</text>

</svg>