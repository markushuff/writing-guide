<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 520" role="img">
  <title>Two filters, three outcomes</title>
  <desc>A flowchart showing two sequential filters for theory inclusion, producing three possible outcomes: citation only, brief mention plus citation, or full treatment as strong inference.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#444441" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Start node -->
  <rect x="190" y="20" width="300" height="44" rx="8" fill="#F1EFE8" stroke="#444441" stroke-width="0.5"/>
  <text x="340" y="42" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">A theory comes to mind</text>

  <!-- Arrow down to F1 -->
  <line x1="340" y1="64" x2="340" y2="100" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- F1 diamond -->
  <polygon points="340,100 480,148 340,196 200,148" fill="white" stroke="#444441" stroke-width="0.5"/>
  <text x="340" y="138" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">F1: Different prediction</text>
  <text x="340" y="158" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#444441">from anchor, for your design?</text>

  <!-- F1 Yes arrow down -->
  <line x1="340" y1="196" x2="340" y2="244" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="352" y="224" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#444441">Yes</text>

  <!-- F1 No arrow right -->
  <line x1="480" y1="148" x2="530" y2="148" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="502" y="138" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#444441">No</text>
  <rect x="530" y="120" width="120" height="56" rx="6" fill="#F1EFE8" stroke="#444441" stroke-width="0.5"/>
  <text x="590" y="142" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">Citation</text>
  <text x="590" y="160" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#444441">only</text>

  <!-- F2 diamond -->
  <polygon points="340,244 480,292 340,340 200,292" fill="white" stroke="#444441" stroke-width="0.5"/>
  <text x="340" y="282" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">F2: Reaches your DV</text>
  <text x="340" y="302" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#444441">mechanistically?</text>

  <!-- F2 Yes arrow down -->
  <line x1="340" y1="340" x2="340" y2="400" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="352" y="374" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#444441">Yes</text>

  <!-- F2 No arrow right -->
  <line x1="480" y1="292" x2="530" y2="292" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="502" y="282" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#444441">No</text>
  <rect x="530" y="252" width="120" height="80" rx="6" fill="#F1EFE8" stroke="#444441" stroke-width="0.5"/>
  <text x="590" y="272" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">Mention</text>
  <text x="590" y="290" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#444441">+ explain why</text>
  <text x="590" y="308" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#444441">not tested here</text>

  <!-- Strong inference outcome -->
  <rect x="170" y="400" width="340" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="420" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#085041">Full treatment</text>
  <text x="340" y="440" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#0F6E56">Strong inference (Platt, 1964)</text>

</svg>
